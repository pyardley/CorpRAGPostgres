version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persist the SQLite database outside the container
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/rag_system.db
    restart: unless-stopped

  # Optional: scheduled incremental ingestion via cron-like service
  # Uncomment and customise to run ingestion on a schedule.
