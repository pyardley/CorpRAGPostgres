  #     sh -c "while true; do
  #       python -m app.ingestion.cli
  #         --source all
  #         --mode incremental
  #         --email $$INGEST_USER_EMAIL
  #         --password $$INGEST_USER_PASSWORD;
  #       sleep 3600;
  #     done"
  #   environment:
  #     INGEST_USER_EMAIL: admin@example.com
  #     INGEST_USER_PASSWORD: ""   # set in .env
  #   restart: unless-stopped
